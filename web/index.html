<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no, maximum-scale=1, user-scalable=no"
    />
    <title>Maç Servisi</title>
    <!-- App Icons -->
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" href="./assets/icon-192x192.png" />
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <!-- Theme Color -->
    <meta name="theme-color" content="#03422d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Maç Servisi" />
    <style>
      /* Disable horizontal scroll and pinch-to-zoom globally */
      html, body {
        overflow-x: hidden !important;
        overscroll-behavior-x: none;
        touch-action: pan-y;
        max-width: 100vw;
      }
      * {
        box-sizing: border-box;
        -webkit-overflow-scrolling: touch;
      }
      /* Prevent horizontal overflow in all containers */
      #root, [data-rnw-class] {
        overflow-x: hidden !important;
        max-width: 100vw;
      }
      /* FlatList and ScrollView web wrappers */
      [class*="ScrollView"], [class*="FlatList"], textarea, input {
        overflow-x: hidden !important;
        overscroll-behavior-x: none;
      }
      /* Prevent iOS Safari input zoom (font-size must be >= 16px) */
      input, textarea, select {
        font-size: 16px !important;
        transform-origin: top left;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
