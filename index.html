<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maç Servisi - Canlı Skor ve Analiz</title>
    <style>
        :root {
            --primary: #0ECDB9;
            --dark: #0A0F14;
            --light: #F8F9FA;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            border: 1px solid rgba(14, 205, 185, 0.2);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #A0AEC0;
        }
        .links {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border: 1px solid var(--primary);
            border-radius: 8px;
            transition: all 0.3s;
        }
        a:hover {
            background: var(--primary);
            color: var(--dark);
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://firatfurkan.github.io/mac-servisi/1.png" alt="Logo" style="width: 100px; height: 100px; border-radius: 20px; margin-bottom: 20px;">
        <h1>Maç Servisi</h1>
        <p>Dünya genelindeki tüm futbol liglerini, canlı skorları, puan durumlarını ve turnuva eşleşmelerini anlık takip edin. Yapay zeka destekli analizlerle maçların nabzını tutun.</p>
        
        <div class="links">
            <a href="https://firatfurkan.github.io/mac-servisi/privacy">Gizlilik Politikası</a>
            <a href="mailto:macservisi@yahoo.com">Destek & İletişim</a>
        </div>
    </div>
    <div class="footer">
        © 2026 Maç Servisi - Tüm Hakları Saklıdır.
    </div>
</body>
</html>
