name: iOS Build (.ipa)

on:
  workflow_dispatch:
    inputs:
      build_note:
        description: 'Build notu (opsiyonel)'
        required: false
        default: ''
  push:
    tags:
      - 'ios-v*'

jobs:
  build-ios:
    name: Build iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_API_KEY=${{ secrets.EXPO_PUBLIC_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_API_BASE_URL=${{ secrets.EXPO_PUBLIC_API_BASE_URL }}" >> .env

      - name: Setup Keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=${{ secrets.KEYCHAIN_PASSWORD }}

          # Create keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          echo "${{ secrets.IOS_P12_BASE64 }}" | base64 -d > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k $KEYCHAIN_PATH \
            -P "${{ secrets.IOS_P12_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set key partition list for codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}" | base64 -d > \
            ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Setup iOS project
        run: |
          cd ios
          if [ -f "Podfile" ]; then
            pod install
          fi

      - name: Build iOS Archive
        run: |
          cd ios

          # Find the workspace
          WORKSPACE=$(find . -maxdepth 1 -name "*.xcworkspace" -type d | head -1)

          if [ -z "$WORKSPACE" ]; then
            echo "Using .xcodeproj instead of .xcworkspace"
            WORKSPACE=$(find . -maxdepth 1 -name "*.xcodeproj" -type d | head -1)
            WORKSPACE_FLAG="-project"
          else
            WORKSPACE_FLAG="-workspace"
          fi

          echo "Building with: $WORKSPACE_FLAG $WORKSPACE"

          xcodebuild $WORKSPACE_FLAG "$WORKSPACE" \
            -scheme Asist \
            -configuration Release \
            -derivedDataPath build \
            -archivePath "build/Asist.xcarchive" \
            -allowProvisioningUpdates \
            archive

      - name: Export .ipa
        run: |
          cd ios

          # Create export options plist
          cat > exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/Asist.xcarchive" \
            -exportPath "build/ipa" \
            -exportOptionsPlist "exportOptions.plist" \
            -allowProvisioningUpdates

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ github.run_number }}.ipa
          path: ios/build/ipa/Asist.ipa
          retention-days: 30

      - name: Build Info
        if: always()
        run: |
          echo "Build #${{ github.run_number }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          ls -lh ios/build/ipa/ 2>/dev/null || echo "IPA not found"
